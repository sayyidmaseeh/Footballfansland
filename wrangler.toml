name = "footballfansland"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[vars]
# Production secrets and environment variables:
# SUPABASE_URL, SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY should be set
# through the Cloudflare Pages dashboard under project Settings -> Environment variables.

[[r2_buckets]]
binding = "R2"
bucket_name = "footballfansland-images"
preview_bucket_name = "footballfansland-images-preview"

